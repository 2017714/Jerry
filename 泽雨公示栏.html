<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>泽雨公示栏</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{--c1:#FF6B8B;--c2:#FFA726;--c3:#6BCF7F;--c4:#4D96FF}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Microsoft YaHei',sans-serif}
body{background:#f0f9ff;padding:15px}
.container{max-width:1100px;margin:0 auto}
.title-box{text-align:center;background:white;padding:15px;border-radius:25px;margin-bottom:25px;box-shadow:0 6px 20px rgba(0,0,0,0.08);border:3px solid var(--c1)}
.title-box h1{font-size:1.9em;color:var(--c1);display:inline-flex;align-items:center;gap:12px}
#ageDisplay{font-size:1.5em;color:var(--c2);font-weight:bold;background:white;padding:4px 15px;border-radius:22px;border:2px solid var(--c2)}
#ageEditBtn{display:none}
.bulletin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-top:20px}
.bulletin{background:white;border-radius:15px;padding:18px;box-shadow:0 5px 15px rgba(0,0,0,0.07);border:2px solid var(--c1);min-height:180px;position:relative}
.bulletin-title{font-size:1.2em;font-weight:bold;color:var(--c1);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #eee;display:flex;justify-content:space-between;align-items:center}
.bulletin-content{color:#333;line-height:1.6;font-size:0.95em;min-height:100px}
.edit-btn{display:none;width:26px;height:26px;background:var(--c3);border-radius:50%;cursor:pointer;align-items:center;justify-content:center;color:white;font-size:0.8em;transition:all 0.3s}
.edit-btn:hover{transform:scale(1.1);background:#4CAF50}
#secretActivate{position:fixed;top:12px;left:12px;width:48px;height:48px;background:rgba(255,107,139,0.05);border:2px dashed rgba(255,107,139,0.2);border-radius:50%;cursor:pointer;z-index:100;transition:all 0.3s}
#secretActivate:hover{background:rgba(255,107,139,0.15);transform:scale(1.1)}
#passwordPanel{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:25px;border-radius:18px;box-shadow:0 18px 45px rgba(0,0,0,0.25);z-index:101;text-align:center;border:4px solid var(--c1);width:92%;max-width:380px}
.password-input{font-size:1.2em;padding:12px;margin:15px 0;width:100%;text-align:center;border:2px solid var(--c3);border-radius:8px;background:#fafafa}
.password-input::placeholder{color:#999}
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:99}
</style>
<script>
document.addEventListener('contextmenu',function(e){e.preventDefault();alert('❌ 禁止右键操作');return false});
document.onkeydown=function(e){
    if(e.keyCode==123){alert('❌ 开发者工具已禁用');return false}
    if(e.ctrlKey&&e.shiftKey&&e.keyCode==73){alert('❌ 禁止打开开发者工具');return false}
    if(e.ctrlKey&&e.shiftKey&&e.keyCode==74)return false
    if(e.ctrlKey&&e.keyCode==85)return false
    if(e.ctrlKey&&e.shiftKey&&e.keyCode==67)return false
};
</script>
</head>
<body>
<div id="secretActivate" title="开发者激活区"></div>
<div class="overlay" id="overlay"></div>
<div id="passwordPanel">
    <h2 style="color:var(--c1);margin-bottom:8px;">🔐 身份验证</h2>
    <p style="color:#666;margin-bottom:12px;">请输入管理员密码：</p >
    <input type="password" class="password-input" id="passwordInput" placeholder="输入密码..." autocomplete="off">
    <div style="display:flex;gap:10px;margin-top:20px;">
        <button onclick="checkPassword()" style="flex:1;padding:12px;background:linear-gradient(135deg,var(--c3),#4CAF50);color:white;border:none;border-radius:10px;cursor:pointer;font-weight:bold;">验证</button>
        <button onclick="closePasswordPanel()" style="flex:1;padding:12px;background:#f1f5f9;color:#666;border:none;border-radius:10px;cursor:pointer;">取消</button>
    </div>
    <p style="margin-top:12px;font-size:0.9em;color:#999;">仅限管理员操作</p >
</div>
<div class="container">
    <div class="title-box">
        <h1>
            🎪 泽雨公示栏
            <span id="ageDisplay">8岁</span>
            <span id="ageEditBtn" class="edit-btn" title="修改年龄" style="display:none;">🎂</span>
        </h1>
        <p style="margin-top:8px;color:#666;font-size:1em;">公示栏数量：<span id="countDisplay">10</span> 个</p >
    </div>
    <div class="bulletin-grid" id="bulletinGrid"></div>
    <div id="addBtn" style="display:none;text-align:center;margin-top:30px;">
        <button onclick="addBulletin()" style="padding:15px 30px;background:var(--c1);color:white;border:none;border-radius:12px;cursor:pointer;font-size:1.1em;font-weight:bold;">＋ 添加新公示栏</button>
    </div>
</div>
<div id="uploadPanel" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:25px;border-radius:18px;box-shadow:0 20px 50px rgba(0,0,0,0.3);z-index:102;border:4px solid var(--c4);width:90%;max-width:500px;">
    <h3 id="uploadTitle" style="color:var(--c4);margin-bottom:15px;">📁 添加内容</h3>
    <div id="dropZone" style="border:3px dashed #ccc;border-radius:12px;padding:25px;text-align:center;margin:15px 0;cursor:pointer;">
        <div style="font-size:3em;color:var(--c4);">📎</div>
        <p style="margin-top:10px;color:#666;">点击选择文件 或 拖放文件到这里</p >
        <p style="font-size:0.9em;color:#999;margin-top:5px;">支持所有文件格式</p >
    </div>
    <input type="file" id="fileInput" style="display:none;" onchange="handleFileUpload(event)">
    <div style="margin:15px 0;">
        <textarea id="textInput" placeholder="或者直接输入文字内容..." style="width:100%;height:120px;padding:12px;border:2px solid #ddd;border-radius:8px;font-size:1em;"></textarea>
    </div>
    <div style="display:flex;gap:10px;">
        <button onclick="saveContent()" style="flex:1;padding:12px;background:var(--c4);color:white;border:none;border-radius:10px;cursor:pointer;">保存</button>
        <button onclick="closeUploadPanel()" style="flex:1;padding:12px;background:#f1f5f9;color:#666;border:none;border-radius:10px;cursor:pointer;">取消</button>
    </div>
</div>
<script>
const CORRECT_PASS="Yangzeyu20170722";
let devMode=false,currentEditIndex=-1;
let bulletins=[
    {title:"📢 网站公告",content:"泽雨公示栏正式上线！支持上传各种文件格式。"},
    {title:"📱 手机收藏",content:"我有3个苹果手机和3个华为手机，正在研究区别。"},
    {title:"💡 项目计划",content:"计划制作AI聊天室，让多个AI一起讨论话题。"},
    {title:"🎮 游戏推荐",content:"最近发现几款不错的编程学习游戏。"},
    {title:"🌟 学习进展",content:"正在学习HTML/CSS，已经能制作简单网页。"},
    {title:"🔧 工具分享",content:"推荐几个好用的在线代码编辑器。"},
    {title:"🎨 创意想法",content:"如果手机能变成机器人宠物会怎样？"},
    {title:"🚀 未来目标",content:"希望学会JavaScript制作交互效果。"},
    {title:"🤖 AI实验",content:"测试了Kimi、DeepSeek等多个AI助手。"},
    {title:"📚 学习记录",content:"记录编程学习过程中的心得体会。"}
];
function init(){
    const savedAge=localStorage.getItem('zeyuAge');
    if(savedAge)document.getElementById('ageDisplay').textContent=savedAge+'岁';
    renderBulletins();
    document.getElementById('secretActivate').onclick=function(){
        document.getElementById('overlay').style.display='block';
        document.getElementById('passwordPanel').style.display='block';
        document.getElementById('passwordInput').focus();
    };
    document.getElementById('ageEditBtn').onclick=function(){
        if(!devMode)return;
        const newAge=prompt('请输入新年龄：',document.getElementById('ageDisplay').textContent.replace('岁',''));
        if(newAge&&!isNaN(newAge)){
            document.getElementById('ageDisplay').textContent=newAge+'岁';
            localStorage.setItem('zeyuAge',newAge);
            alert('✅ 年龄已更新！');
        }
    };
    const dropZone=document.getElementById('dropZone');
    dropZone.addEventListener('dragover',function(e){
        e.preventDefault();
        dropZone.style.borderColor=var(--c4);
        dropZone.style.background='#f0f9ff';
    });
    dropZone.addEventListener('dragleave',function(e){
        e.preventDefault();
        dropZone.style.borderColor='#ccc';
        dropZone.style.background='white';
    });
    dropZone.addEventListener('drop',function(e){
        e.preventDefault();
        dropZone.style.borderColor='#ccc';
        dropZone.style.background='white';
        if(e.dataTransfer.files.length>0){
            document.getElementById('fileInput').files=e.dataTransfer.files;
            handleFileUpload({target:{files:e.dataTransfer.files}});
        }
    });
}
function checkPassword(){
    const input=document.getElementById('passwordInput').value;
    if(input===CORRECT_PASS){
        devMode=true;
        document.querySelectorAll('.edit-btn').forEach(btn=>{
            btn.style.display='flex';
        });
        document.getElementById('ageEditBtn').style.display='flex';
        document.getElementById('addBtn').style.display='block';
        document.getElementById('overlay').style.display='none';
        document.getElementById('passwordPanel').style.display='none';
        document.getElementById('passwordInput').value='';
        alert('✅ 开发者模式已激活！现在可以编辑内容。');
        console.log('🔓 开发者模式激活 - '+new Date().toLocaleString());
    }else{
        alert('❌ 密码错误！请重试。');
        document.getElementById('passwordInput').value='';
        document.getElementById('passwordInput').focus();
        console.log('⚠️ 密码尝试失败 - '+new Date().toLocaleString());
    }
}
function closePasswordPanel(){
    document.getElementById('overlay').style.display='none';
    document.getElementById('passwordPanel').style.display='none';
    document.getElementById('passwordInput').value='';
}
function renderBulletins(){
    const grid=document.getElementById('bulletinGrid');
    grid.innerHTML='';
    bulletins.forEach((item,index)=>{
        const div=document.createElement('div');
        div.className='bulletin';
        div.innerHTML=`
            <div class="bulletin-title">
                ${item.title}
                <div class="edit-btn" onclick="editBulletin(${index})" title="编辑内容">✎</div>
            </div>
            <div class="bulletin-content">${item.content}</div>
        `;
        grid.appendChild(div);
    });
    document.getElementById('countDisplay').textContent=bulletins.length;
}
function editBulletin(index){
    if(!devMode)return;
    currentEditIndex=index;
    const item=bulletins[index];
    document.getElementById('textInput').value=item.content;
    document.getElementById('overlay').style.display='block';
    document.getElementById('uploadPanel').style.display='block';
    document.getElementById('uploadTitle').textContent=`编辑：${item.title}`;
}
function addBulletin(){
    if(!devMode)return;
    const title=prompt('请输入新公示栏标题：','新公示栏');
    if(!title)return;
    currentEditIndex=-1;
    document.getElementById('textInput').value='';
    document.getElementById('overlay').style.display='block';
    document.getElementById('uploadPanel').style.display='block';
    document.getElementById('uploadTitle').textContent=`添加：${title}`;
    bulletins.push({title:title,content:''});
}
function handleFileUpload(event){
    const file=event.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=function(e){
        const fileType=getFileType(file.name);
        let content='';
        if(fileType==='text'){
            content=e.target.result;
            alert('✅ 文本文件已加载！');
        }else if(fileType==='image'){
            content=`🖼️ 图片文件：${file.name}\n📏 大小：${formatFileSize(file.size)}\n📷 可在本地查看`;
        }else if(fileType==='document'){
            content=`📄 文档文件：${file.name}\n📏 大小：${formatFileSize(file.size)}\n📎 格式：${getFileExtension(file.name).toUpperCase()}`;
        }else if(fileType==='archive'){
            content=`📦 压缩文件：${file.name}\n📏 大小：${formatFileSize(file.size)}`;
        }else{
            content=`📁 文件：${file.name}\n📏 大小：${formatFileSize(file.size)}\n📄 类型：${file.type||'未知'}`;
        }
        document.getElementById('textInput').value=content;
    };
    if(file.type&&file.type.startsWith('text/')){
        reader.readAsText(file);
    }else{
        reader.readAsDataURL(file);
    }
}
function getFileType(filename){
    const ext=getFileExtension(filename).toLowerCase();
    const textExt=['txt','md','html','css','js','json','xml'];
    const imageExt=['jpg','jpeg','png','gif','bmp','webp','svg'];
    const docExt=['pdf','doc','docx','ppt','pptx','xls','xlsx'];
    const archiveExt=['zip','rar','7z','tar','gz'];
    if(textExt.includes(ext))return'text';
    if(imageExt.includes(ext))return'image';
    if(docExt.includes(ext))return'document';
    if(archiveExt.includes(ext))return'archive';
    return'other';
}
function getFileExtension(filename){
    return filename.slice((filename.lastIndexOf(".")-1>>>0)+2);
}
function formatFileSize(bytes){
    if(bytes===0)return'0B';
    const k=1024;
    const sizes=['B','KB','MB','GB'];
    const i=Math.floor(Math.log(bytes)/Math.log(k));
    return parseFloat((bytes/Math.pow(k,i)).toFixed(2))+sizes[i];
}
function saveContent(){
    const text=document.getElementById('textInput').value.trim();
    if(!text){
        alert('⚠️ 请输入内容或选择文件！');
        return;
    }
    if(currentEditIndex===-1){
        bulletins[bulletins.length-1].content=text;
    }else{
        bulletins[currentEditIndex].content=text;
    }
    renderBulletins();
    closeUploadPanel();
    alert('✅ 内容已保存！');
}
function closeUploadPanel(){
    document.getElementById('overlay').style.display='none';
    document.getElementById('uploadPanel').style.display='none';
    document.getElementById('fileInput').value='';
    document.getElementById('textInput').value='';
    currentEditIndex=-1;
}
document.addEventListener('keydown',function(e){
    if(!devMode)return;
    if(e.ctrlKey&&e.key==='s'){
        e.preventDefault();
        alert('💾 所有更改已自动保存');
    }
    if(e.ctrlKey&&e.key==='n'){
        e.preventDefault();
        addBulletin();
    }
    if(e.key==='Escape'){
        closePasswordPanel();
        closeUploadPanel();
    }
});
window.onload=init;
</script>
</body>
</html>
